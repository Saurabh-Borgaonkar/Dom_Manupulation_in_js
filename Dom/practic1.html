    <script>
//write js program to load java file on browser using promis
function load(src){
return new Promise((resolve, reject) => {
    let script=document.createElement("script");
    script.src=src;
    script.onload=()=>resolve("File is loaded on browser");
    script.onerror=reject(new Error("Error"));
  //  document.head.append(script)
   document.body.append(script); 

})
}

load("hello.js")
.then((res)=>{
alert(res);
}).catch((err)=>{
alert(err);
})
