                return new Promise((resolve,reject)=>{
                    let timeout=1+6*Math.random();
                    setTimeout(() => {
                        resolve();
                    },timeout*1000);
                })
            }
            const addItem= async (item)=>{
              await  randomDelay();
              let div=document.createElement('div');
                div.innerText=item;
              document.body.append(div);
            }
