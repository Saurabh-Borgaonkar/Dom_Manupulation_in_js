
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 13</title>
    <style>
        .container{
            border: 1px solid black;
        }
        .card{
            height: 80px;
            width: 700px;
            border: 2px solid black;
            display: flex;
            align-items: center;
            gap: 20px;
            margin: 5px;
            position: relative;
        }
        .img{
    
            background-color: gray;
            min-width:  110px;
            height: 70px;
            position: relative;
            margin-left: 5px;
            border-radius: 5px;
        }

        .img p{
            background-color: black;
            border-radius: 2px;
            padding: 5px;
            font-size: 10px;
            color: white;
            position: absolute;
            right: 2px;
            bottom: 2px;

        }
        .text h3, p{
            padding: 2px 0;
            margin: 0;
            
        }
        h1{
            text-align: center;
        }

    </style>
</head>
<body>
    <h1><b> Dynamically inserting cards</b></h1>
    <div class="container">

        <div class="card">
            <div class="img">
            <img src="" alt="img">
            <p>32.10</p>
            </div>
            <div class="text">
                <h3>Introduction to CSS | Sigma web development course - Tutorial #14</h3>
                <p>375K views . 1 year ago </p>
            </div>
        </div>
    </div>

    <script src="Exercise_13.js"></script>
</body>
</html>
